[book]
title = "Building an Operating System in Go: xv6 on RISC-V"
authors = ["lizhiquan"]
description = "Learn operating-system fundamentals by building a complete xv6 kernel in Go on RISC-V."
language = "en"
src = "src"

[output.html]
# English edition is served at https://lizhiquan.github.io/xv6/en/
site-url = "/xv6/en/"
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/lizhiquan/xv6"
edit-url-template = "https://github.com/lizhiquan/xv6/edit/main/en/{path}"
additional-js = ["lang-switch.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
